<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tek Caffe — Coming Soon</title>
<meta name="description" content="The new Tek Caffe website is under construction. Get in touch by email or book a call.">
<!-- Single self-contained file: works from file://, no server needed. -->
<!-- ═══ CONFIG — edit these two lines ═══════════════════════════════ -->
<script>
  const CONTACT_EMAIL = "sales@tekcaffe.com";
  const CALENDLY_URL  = "https://calendly.com/ahmedmisbah/book-an-appointment";
  const YOUTUBE_URL   = "https://www.youtube.com/playlist?list=PLQyfTtXmGOZeOiJZCA6fryQKBdO2bQOYN";  /* Tek Caffe Podcast playlist — replace with channel URL if preferred */
</script>
<!-- ══════════════════════════════════════════════════════════════════ -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Almarai:wght@300;700&display=swap" rel="stylesheet">
<style>
  /* Brand palette per Tek Caffe Brand Identity Guide */
  :root{--blue:#004CFF;--navy:#002780;--magenta:#EA00FF;--purple:#8A0096;--white:#fff}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;font-family:'Poppins',system-ui,sans-serif; /* TODO: replace with 'Now' when font files arrive */
    color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;
    background:linear-gradient(120deg,var(--purple) 0%,var(--navy) 55%,#001a5e 100%);
    position:relative;overflow-x:hidden;padding:2rem 1.25rem;
  }
  html[lang="ar"] body{font-family:'Almarai',system-ui,sans-serif}
  body::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.3;
    background:
      radial-gradient(circle at 12% 15%,rgba(234,0,255,.55),transparent 35%),
      radial-gradient(circle at 88% 85%,rgba(0,76,255,.55),transparent 35%),
      repeating-linear-gradient(60deg,transparent 0 46px,rgba(255,255,255,.05) 46px 47px),
      repeating-linear-gradient(-60deg,transparent 0 64px,rgba(255,255,255,.04) 64px 65px)}
  .wrap{position:relative;max-width:640px;width:100%}
  .logo{width:min(280px,64vw);height:auto;margin:0 auto .4rem;display:block;filter:drop-shadow(0 0 22px rgba(234,0,255,.35))}
  h1{font-size:clamp(1.6rem,5vw,2.5rem);margin:1.6rem 0 .4rem;font-weight:700}
  .mission{font-weight:300;color:#e8e6ff;max-width:46ch;margin:0 auto 2rem;line-height:1.7}
  /* waveform "building" animation — the brand's audio-wave mark, gently pulsing */
  .waveform{display:inline-flex;gap:7px;align-items:center;height:34px;margin-bottom:.4rem;color:var(--magenta)}
  .waveform i{width:5px;border-radius:3px;background:currentColor;display:block;animation:pulse 1.4s ease-in-out infinite}
  .waveform i:nth-child(1){height:30%;animation-delay:0s}
  .waveform i:nth-child(2){height:65%;animation-delay:.15s}
  .waveform i:nth-child(3){height:100%;animation-delay:.3s}
  .waveform i:nth-child(4){height:65%;animation-delay:.45s}
  .waveform i:nth-child(5){height:30%;animation-delay:.6s}
  @keyframes pulse{0%,100%{transform:scaleY(.6)}50%{transform:scaleY(1.15)}}
  @media (prefers-reduced-motion:reduce){.waveform i{animation:none}}
  .cta{display:flex;gap:.9rem;justify-content:center;flex-wrap:wrap;margin-top:.6rem}
  .btn{display:inline-block;padding:.8rem 1.7rem;border-radius:999px;font-weight:600;font-size:1rem;
    text-decoration:none;border:2px solid transparent;transition:transform .12s ease;cursor:pointer;font-family:inherit}
  .btn:hover{transform:translateY(-2px)}
  .btn:focus-visible{outline:3px solid #fff;outline-offset:3px}
  .btn-primary{background:linear-gradient(120deg,var(--magenta),var(--purple) 45%,var(--navy));color:#fff}
  .btn-outline{border-color:#fff;color:#fff;background:transparent}
  .email-line{margin-top:1.6rem;font-size:.92rem;color:#d9d5ff}
  .email-line a{color:#fff;font-weight:600}
  .lang-toggle{position:absolute;top:0;inset-inline-end:0;border:1.5px solid rgba(255,255,255,.7);
    background:transparent;color:#fff;font:inherit;font-weight:700;padding:.3rem .85rem;border-radius:999px;cursor:pointer}
  .lang-toggle:hover{background:#fff;color:var(--navy)}
  /* Calendly modal */
  .modal{position:fixed;inset:0;background:rgba(0,10,40,.75);display:none;align-items:center;justify-content:center;padding:1rem;z-index:10}
  @media (max-width:640px){.modal{padding:.4rem}.modal-box{height:96vh;border-radius:12px}}
  .modal.open{display:flex}
  .modal-box{background:#fff;border-radius:16px;width:min(1000px,100%);height:90vh;min-height:560px;position:relative;overflow:hidden}
  .modal-box iframe{width:100%;height:100%;border:0;display:block}
  #calMount{height:100%}
  .modal-close{position:absolute;top:.5rem;inset-inline-end:.5rem;border:0;background:var(--navy);color:#fff;
    border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;z-index:1}
  .modal-fallback{display:flex;height:100%;align-items:center;justify-content:center;color:var(--navy);padding:2rem;text-align:center}
  footer{margin-top:2.6rem;font-size:.78rem;color:#cfc9f2}
  footer a{color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <button class="lang-toggle" id="langBtn" onclick="toggleLang()" aria-label="Switch language">عربي</button>

  <img class="logo" src="logo.png" alt="Tek Caffe — تك كافيه"
       width="280" height="348">

  <div style="margin-top:.6rem"><span class="waveform" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span></div>
  <h1 data-en="Something new is brewing" data-ar="نُحضّر لكم شيئًا جديدًا">Something new is brewing</h1>
  <p class="mission"
     data-en="Our new website is under construction. In the meantime, we'd love to hear from you — send us an email or book a call."
     data-ar="موقعنا الجديد قيد الإنشاء. في هذه الأثناء، يسعدنا تواصلكم معنا عبر البريد الإلكتروني أو بحجز مكالمة.">
     Our new website is under construction. In the meantime, we'd love to hear from you — send us an email or book a call.</p>

  <div class="cta">
    <a class="btn btn-primary" id="emailBtn" href="#"
       data-en="Email us" data-ar="راسلنا بالبريد">Email us</a>
    <button class="btn btn-outline" id="calBtn" onclick="openCalendly()"
       data-en="Book a call" data-ar="احجز مكالمة">Book a call</button>
    <a class="btn btn-outline" id="ytBtn" href="#" target="_blank" rel="noopener"
       data-en="▶ Watch the podcast" data-ar="▶ شاهد البودكاست">▶ Watch the podcast</a>
  </div>

  <p class="email-line">
    <span data-en="Or write to us directly at" data-ar="أو راسلنا مباشرة على">Or write to us directly at</span>
    <a id="emailText" href="#">…</a>
  </p>

  <footer>
    © <span id="yr"></span> Tek Caffe ·
    <a href="https://www.linkedin.com/company/tek-caffe">LinkedIn</a> ·
    <a id="ytFooter" href="#" target="_blank" rel="noopener">YouTube</a>
  </footer>
</div>

<div class="modal" id="calModal" role="dialog" aria-modal="true" aria-label="Book a call">
  <div class="modal-box">
    <button class="modal-close" onclick="closeCalendly()" aria-label="Close">✕</button>
    <div id="calMount" class="modal-fallback"></div>
  </div>
</div>

<script>
  document.getElementById("yr").textContent = new Date().getFullYear();
  document.getElementById("ytBtn").href = YOUTUBE_URL;
  document.getElementById("ytFooter").href = YOUTUBE_URL;
  document.getElementById("emailBtn").href = "mailto:" + CONTACT_EMAIL + "?subject=" + encodeURIComponent("Hello Tek Caffe");
  const et = document.getElementById("emailText");
  et.href = "mailto:" + CONTACT_EMAIL; et.textContent = CONTACT_EMAIL;

  let LANG = "en";
  function toggleLang(){
    LANG = LANG === "en" ? "ar" : "en";
    document.documentElement.lang = LANG;
    document.documentElement.dir  = LANG === "ar" ? "rtl" : "ltr";
    document.getElementById("langBtn").textContent = LANG === "en" ? "عربي" : "EN";
    document.querySelectorAll("[data-en]").forEach(el => el.textContent = el.dataset[LANG]);
    document.title = LANG === "ar" ? "تك كافيه — قريبًا" : "Tek Caffe — Coming Soon";
  }

  function openCalendly(){
    const mount = document.getElementById("calMount");
    if (CALENDLY_URL) {
      mount.classList.remove("modal-fallback");
      // Calendly inline-embed params: correct internal sizing + hides cookie banner
      const host = (location.hostname && location.protocol.startsWith("http")) ? location.hostname : "tekcaffe.com";
      const url = CALENDLY_URL + (CALENDLY_URL.includes("?") ? "&" : "?")
        + "embed_domain=" + encodeURIComponent(host)
        + "&embed_type=Inline&hide_gdpr_banner=1&primary_color=8A0096";
      mount.innerHTML = '<iframe src="' + url + '" title="Calendly scheduler" loading="lazy"></iframe>';
    } else {
      /* Placeholder until the Calendly link is configured at the top of this file */
      mount.innerHTML = LANG === "ar"
        ? "<p><b>رابط Calendly لم يُضبط بعد.</b><br>يرجى مراسلتنا على <a href='mailto:" + CONTACT_EMAIL + "'>" + CONTACT_EMAIL + "</a> لحجز مكالمة.</p>"
        : "<p><b>Calendly link not configured yet.</b><br>Please email <a href='mailto:" + CONTACT_EMAIL + "'>" + CONTACT_EMAIL + "</a> to book a call.<br><small>(Site owner: paste your Calendly URL into CALENDLY_URL at the top of this file.)</small></p>";
    }
    document.getElementById("calModal").classList.add("open");
  }
  function closeCalendly(){ document.getElementById("calModal").classList.remove("open"); }
  document.getElementById("calModal").addEventListener("click", e => { if (e.target.id === "calModal") closeCalendly(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeCalendly(); });
</script>
</body>
</html>
